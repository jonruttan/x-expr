name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Native x86_64 Linux (glibc)
  linux-x86_64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - cc: gcc
            extra_cflags: ""
          - cc: clang
            extra_cflags: ""
          - cc: gcc
            extra_cflags: "-DX_USE_STDLIB"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Test
        env:
          CC: ${{ matrix.cc }}
          CFLAGS: ${{ matrix.extra_cflags }}
        run: make test-quick

  # Native macOS arm64
  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Test
        run: make test-quick

  # Valgrind (x86_64 Linux)
  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Test with Valgrind
        run: make test

  # Cross-arch via QEMU + Docker
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Alpine (musl)
          - dockerfile: .github/Dockerfile.alpine
            platform: linux/arm64
            name: alpine-arm64
          - dockerfile: .github/Dockerfile.alpine
            platform: linux/arm/v7
            name: alpine-armv7
          - dockerfile: .github/Dockerfile.alpine
            platform: linux/riscv64
            name: alpine-riscv64
          - dockerfile: .github/Dockerfile.alpine
            platform: linux/386
            name: alpine-i386
          # Debian (glibc)
          - dockerfile: .github/Dockerfile.debian
            platform: linux/arm64
            name: debian-arm64
          - dockerfile: .github/Dockerfile.debian
            platform: linux/arm/v7
            name: debian-armv7
          - dockerfile: .github/Dockerfile.debian
            platform: linux/386
            name: debian-i386
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test (${{ matrix.name }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f ${{ matrix.dockerfile }} \
            .
