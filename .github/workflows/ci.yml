name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - cc: gcc
            extra_cflags: ""
          - cc: clang
            extra_cflags: ""
          - cc: gcc
            extra_cflags: "-DX_USE_STDLIB"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and test
        env:
          CC: ${{ matrix.cc }}
          CFLAGS: ${{ matrix.extra_cflags }}
        run: make test-quick

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Test with Valgrind
        run: make test
